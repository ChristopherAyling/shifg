<script type="module">
import { WASI, File, OpenFile, ConsoleStdout } from
  "https://esm.sh/@bjorn3/browser_wasi_shim";

const fds = [
  new OpenFile(new File([])),
  ConsoleStdout.lineBuffered(msg => console.log(msg)),
  ConsoleStdout.lineBuffered(msg => console.warn(msg)),
];
const wasi = new WASI([], [], fds);

const wasm = await WebAssembly.compileStreaming(fetch("./zig-out/bin/game.wasm"));
const instance = await WebAssembly.instantiate(wasm, {
  wasi_snapshot_preview1: wasi.wasiImport,
});

wasi.initialize(instance);
instance.exports.yo();
</script>
