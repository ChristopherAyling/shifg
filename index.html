<script>
(async () => {
  const wasi_stub = new Proxy({}, {
    get: () => () => 0,
  });
  const { instance } = await WebAssembly.instantiateStreaming(
    fetch("./zig-out/bin/game.wasm"),
    {
      wasi_snapshot_preview1: wasi_stub,
      env: { log_write: (ptr, len) => {
        const text = new TextDecoder().decode(
          new Uint8Array(instance.exports.memory.buffer, ptr, len)
        );
        // document.getElementById("out").textContent += text;
        console.log("[ZIG] :: " + text)
      }}
    }
  );
  instance.exports.yo();
  while (true) {
    instance.exports.frame();
  }
})();
</script>
