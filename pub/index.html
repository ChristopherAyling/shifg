<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
        }
        #controls {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            text-align: right;
            line-height: 1.4;
        }
        #controls span { color: #fff; }
        @media (pointer: coarse) {
            #controls { display: none; }
        }
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            touch-action: none;
        }
        @media (pointer: coarse) {
            #touch-controls { display: flex; justify-content: space-between; align-items: flex-end; }
        }
        .touch-btn {
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active, .touch-btn.pressed {
            background: rgba(255,255,255,0.3);
            border-color: #fff;
        }
        #dpad {
            display: grid;
            grid-template-columns: 40px 40px 40px;
            grid-template-rows: 40px 40px 40px;
            gap: 3px;
        }
        #dpad .touch-btn { width: 40px; height: 40px; font-size: 14px; }
        #center-btns {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        #center-btns .touch-btn {
            width: 60px;
            height: 36px;
            font-size: 12px;
        }
        #action-btns {
            display: grid;
            grid-template-columns: 50px 50px;
            grid-template-rows: 50px 50px;
            gap: 4px;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="controls">
        <span>W A S D</span> move<br>
        <span>H J K L</span> a b x y<br>
        <span>E</span> start
    </div>
    <div id="touch-controls">
        <div id="dpad">
            <button class="touch-btn" data-keys="KeyW,KeyA">&#8598;</button>
            <button class="touch-btn" data-keys="KeyW">&#9650;</button>
            <button class="touch-btn" data-keys="KeyW,KeyD">&#8599;</button>
            <button class="touch-btn" data-keys="KeyA">&#9664;</button>
            <button class="touch-btn" data-keys="">&#8226;</button>
            <button class="touch-btn" data-keys="KeyD">&#9654;</button>
            <button class="touch-btn" data-keys="KeyS,KeyA">&#8601;</button>
            <button class="touch-btn" data-keys="KeyS">&#9660;</button>
            <button class="touch-btn" data-keys="KeyS,KeyD">&#8600;</button>
        </div>
        <div id="center-btns">
            <button class="touch-btn" data-keys="KeyE">START</button>
        </div>
        <div id="action-btns">
            <button class="touch-btn" data-keys="KeyK">X</button>
            <button class="touch-btn" data-keys="KeyL">Y</button>
            <button class="touch-btn" data-keys="KeyH">A</button>
            <button class="touch-btn" data-keys="KeyJ">B</button>
        </div>
    </div>
</body>

<script type="module">

const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext('2d');

import { WASI, File, OpenFile, ConsoleStdout } from
  "./vendor/browser_wasi_shim.js";

const fds = [
  new OpenFile(new File([])),
  ConsoleStdout.lineBuffered(msg => console.log(msg)),
  ConsoleStdout.lineBuffered(msg => console.warn(msg)),
];
const wasi = new WASI([], [], fds);

// Audio system
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfxBuffers = {};  // sfx_id -> AudioBuffer
const musicBuffers = {}; // track_id -> AudioBuffer
let currentMusic = null;
let currentMusicId = null;

// SfxTrack enum: 0=click, 1=close
const sfxPaths = ['audio/sfx/click.wav', 'audio/sfx/close.wav'];
// MusicTrack enum: 0=splash, 1=overworld
const musicPaths = ['audio/music/missing.wav', 'audio/music/overworld.wav'];

async function loadAudio(path) {
    try {
        const response = await fetch(path);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) {
        console.warn('Failed to load audio:', path, e);
        return null;
    }
}

// Preload all audio
for (let i = 0; i < sfxPaths.length; i++) {
    loadAudio(sfxPaths[i]).then(buf => { sfxBuffers[i] = buf; });
}
for (let i = 0; i < musicPaths.length; i++) {
    loadAudio(musicPaths[i]).then(buf => { musicBuffers[i] = buf; });
}

function js_playSound(sfx_id) {
    const buffer = sfxBuffers[sfx_id];
    if (!buffer) return;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start();
}

function js_setMusic(track_id) {
    if (track_id === currentMusicId) return;
    js_stopMusic();
    currentMusicId = track_id;
    const buffer = musicBuffers[track_id];
    if (!buffer) return;
    currentMusic = audioCtx.createBufferSource();
    currentMusic.buffer = buffer;
    currentMusic.loop = true;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.4;
    currentMusic.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    currentMusic.start();
}

function js_stopMusic() {
    if (currentMusic) {
        currentMusic.stop();
        currentMusic = null;
        currentMusicId = null;
    }
}

// Resume audio context on user interaction (required by browsers)
function resumeAudio() {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}
document.addEventListener('click', resumeAudio);
document.addEventListener('keydown', resumeAudio);
document.addEventListener('touchstart', resumeAudio);

const wasm = await WebAssembly.compileStreaming(fetch("./game.wasm"));
const instance = await WebAssembly.instantiate(wasm, {
  wasi_snapshot_preview1: wasi.wasiImport,
  env: {
    js_playSound,
    js_setMusic,
    js_stopMusic,
  },
});

wasi.initialize(instance);
const exports = instance.exports;

instance.exports.yo();
instance.exports.game_init();

const game_frame = exports.game_frame;
const set_input_state = exports.set_input_state;

// Input handling - same keys as platform_main.zig
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
document.querySelectorAll('.touch-btn').forEach(btn => {
    const keyStr = btn.dataset.keys !== undefined ? btn.dataset.keys : btn.dataset.key;
    const keyList = keyStr ? keyStr.split(',').filter(k => k) : [];
    const press = (e) => { e.preventDefault(); keyList.forEach(k => keys[k] = true); btn.classList.add('pressed'); };
    const release = (e) => { e.preventDefault(); keyList.forEach(k => keys[k] = false); btn.classList.remove('pressed'); };
    btn.addEventListener('touchstart', press, { passive: false });
    btn.addEventListener('touchend', release, { passive: false });
    btn.addEventListener('touchcancel', release, { passive: false });
});

function getInputBits() {
    let bits = 0;
    if (keys['KeyW'])     bits |= 1;    // up
    if (keys['KeyS'])     bits |= 2;    // down
    if (keys['KeyA'])     bits |= 4;    // left
    if (keys['KeyD'])     bits |= 8;    // right
    if (keys['KeyH'])     bits |= 16;   // a
    if (keys['KeyJ'])     bits |= 32;   // b
    if (keys['KeyK'])     bits |= 64;   // x
    if (keys['KeyL'])     bits |= 128;  // y
    if (keys['KeyE'])     bits |= 256;  // start
    return bits;
}

const w = exports.get_screen_w();
const h = exports.get_screen_h();
console.log({w, h})

canvas.width = w;
canvas.height = h;

function resizeCanvas() {
    const maxW = window.innerWidth * 0.95;
    const maxH = window.innerHeight * 0.95;
    const scale = Math.floor(Math.min(maxW / w, maxH / h));
    canvas.style.width = (w * scale) + 'px';
    canvas.style.height = (h * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const imageData = ctx.createImageData(w, h);

const frame_to_canvas = () => {
  const fbPtr = exports.get_framebuffer_ptr();
  const fbLen = exports.get_framebuffer_len();

  // View the framebuffer as u32 array
  const fb32 = new Uint32Array(exports.memory.buffer, fbPtr, fbLen);
  const pixels = imageData.data; // Uint8ClampedArray [R,G,B,A, R,G,B,A, ...]

  for (let i = 0; i < fbLen; i++) {
      const c = fb32[i];
      const j = i * 4;
      pixels[j]     = (c >>> 16) & 0xFF; // R
      pixels[j + 1] = (c >>> 8)  & 0xFF; // G
      pixels[j + 2] =  c         & 0xFF; // B
      pixels[j + 3] = 255;               // A (always opaque)
  }

  ctx.putImageData(imageData, 0, 0);
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}


const TARGET_FPS = 60;
const FRAME_TIME = 1000 / TARGET_FPS;
let lastFrameTime = performance.now();

while (true) {
  const now = performance.now();
  const elapsed = now - lastFrameTime;

  if (elapsed >= FRAME_TIME) {
    lastFrameTime = now - (elapsed % FRAME_TIME);
    set_input_state(getInputBits());
    game_frame();
    frame_to_canvas();
  }

  await sleep(1);
}

// frame_to_canvas()
</script>
</html>
